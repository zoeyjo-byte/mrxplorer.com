<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful — MRXplorer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #000;
            font-size: 1rem;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitle { color: #555; margin-bottom: 1.5rem; }
        .purchase-list { margin-bottom: 1.5rem; }
        .purchase-item {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
        }
        .purchase-item .name { font-weight: 600; }
        .purchase-item .date { color: #555; font-size: 0.95rem; margin-top: 0.25rem; }
        .actions { margin-top: 2rem; }
        .actions a {
            display: inline-block;
            background: #635bff;
            color: #fff;
            padding: 0.85rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-right: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .actions a:hover { background: #4a42e0; }
        .actions a.secondary {
            background: #e8e8e8;
            color: #333;
        }
        .actions a.secondary:hover { background: #d0d0d0; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TB3GBL2RQ0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TB3GBL2RQ0');
    </script>
</head>
<body>

<header style="margin-bottom: 2rem;">
    <a href="https://www.mrxplorer.com" target="_blank">
        <img src="mrxplorer-logo.png" alt="MRXplorer" style="height: 48px; width: auto;" />
    </a>
</header>

<h1>✅ You're registered!</h1>
<p class="subtitle" id="confirmation-msg">Your registration is confirmed. You'll receive a confirmation email shortly.</p>

<div class="purchase-list" id="purchase-list"></div>

<div class="actions">
    <a href="index.html">Register for More Classes</a>
    <a href="leaders.html" class="secondary">For Leaders</a>
    <a href="https://www.mrxplorer.com" class="secondary">MRXplorer Home</a>
</div>

<script>
    const list = document.getElementById('purchase-list');
    const msg = document.getElementById('confirmation-msg');

    try {
        const data = sessionStorage.getItem('mrx_purchases');
        if (data) {
            const items = JSON.parse(data);
            const count = items.length;

            msg.textContent = count === 1
                ? 'You\'re registered for 1 class. You\'ll receive a confirmation email with calendar files shortly.'
                : `You're registered for ${count} classes. You'll receive a confirmation email with calendar files shortly.`;

            list.innerHTML = items.map(item => `
                <div class="purchase-item">
                    <div class="name">${item.name}</div>
                    ${item.date ? `<div class="date">${new Date(item.date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', timeZoneName: 'short' })}</div>` : ''}
                </div>
            `).join('');

            sessionStorage.removeItem('mrx_purchases');
        }
    } catch (e) {
        console.error(e);
    }
</script>
</body>
</html>
